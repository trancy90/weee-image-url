<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEEE! IMAGE WORKSTATION</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8 text-slate-800 font-sans">
    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        
        <div class="p-6 border-b bg-white sticky top-0 z-20">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight">⚙️ OFFICIAL ADS HELPER</h1>
                    <p class="text-xs text-slate-400 mt-1 uppercase font-bold tracking-widest italic">Connected to campaigns.sayweee.com</p>
                </div>
                <div id="status" class="text-sm font-bold px-4 py-2 rounded-lg transition-all shadow-sm bg-slate-100 text-slate-500">SYSTEM READY</div>
            </div>
            
            <div class="mt-6 p-4 bg-slate-900 rounded-xl flex flex-wrap items-center gap-8 text-white shadow-inner">
                <div class="flex items-center gap-3">
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Target Size:</span>
                    <label class="flex items-center gap-2 cursor-pointer hover:text-green-400 transition-colors">
                        <input type="radio" name="size-limit" value="raw" checked class="w-4 h-4 accent-green-500">
                        <span class="text-sm font-bold">Original</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer hover:text-green-400 transition-colors">
                        <input type="radio" name="size-limit" value="1" class="w-4 h-4 accent-green-500">
                        <span class="text-sm font-bold">1MB Limit</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer hover:text-green-400 transition-colors">
                        <input type="radio" name="size-limit" value="2" class="w-4 h-4 accent-green-500">
                        <span class="text-sm font-bold">2MB Limit</span>
                    </label>
                </div>
            </div>

            <div id="drop-area" class="mt-4 border-2 border-dashed border-slate-200 rounded-xl py-12 text-center cursor-pointer hover:border-green-500 hover:bg-green-50/50 transition-all group">
                <p class="text-slate-400 group-hover:text-green-600 font-medium text-lg">Drop images here to upload directly to WEEE! Server</p>
                <input type="file" id="file-input" multiple accept="image/*" class="hidden">
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 text-slate-500 text-[10px] uppercase font-black tracking-widest border-b">
                    <tr>
                        <th class="px-6 py-4 w-40">Preview</th>
                        <th class="px-6 py-4">Image Info</th>
                        <th class="px-6 py-4">Official WEEE! URL</th>
                        <th class="px-6 py-4 w-48 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
        
        <div id="empty-state" class="py-24 text-center">
            <div class="inline-block p-6 bg-slate-50 rounded-full mb-4">
                <span class="text-4xl">🚀</span>
            </div>
            <p class="text-slate-400 font-medium">Ready for high-speed ads processing</p>
        </div>
    </div>

    <script>
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const tableBody = document.getElementById('table-body');
        const status = document.getElementById('status');
        const emptyState = document.getElementById('empty-state');

        // Official API Configuration from Documentation
        const API_ENDPOINT = "https://campaigns.sayweee.com/api/secure/ads/upload/media.json";
        const API_TOKEN = "Token 9d6a81ee5e5fb3161a98295d54f99c23";

        dropArea.onclick = () => fileInput.click();
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => {
            dropArea.addEventListener(name, e => e.preventDefault());
        });
        dropArea.ondrop = (e) => handleFiles(e.dataTransfer.files);
        fileInput.onchange = () => handleFiles(fileInput.files);

        async function handleFiles(files) {
            if (files.length > 0) emptyState.classList.add('hidden');
            const mode = document.querySelector('input[name="size-limit"]:checked').value;

            for (let file of files) {
                const row = createRow(file);
                tableBody.prepend(row);

                try {
                    let finalFile = file;
                    const infoLabel = row.querySelector('.process-info');
                    const downloadBtn = row.querySelector('.download-btn');

                    // 1. Compression logic
                    if (mode !== 'raw') {
                        infoLabel.innerText = "⏳ COMPRESSING...";
                        const compressedBlob = await compressImage(file, mode);
                        finalFile = new File([compressedBlob], file.name, { type: 'image/jpeg' });
                        infoLabel.innerText = `✅ READY (${(finalFile.size / 1024 / 1024).toFixed(2)}MB)`;
                        infoLabel.className = "process-info text-[10px] text-green-600 font-bold mt-1";
                    } else {
                        infoLabel.innerText = "✨ ORIGINAL QUALITY";
                    }

                    // Enable Download for local use
                    downloadBtn.onclick = () => downloadFile(finalFile);
                    downloadBtn.disabled = false;
                    downloadBtn.className = "download-btn bg-slate-800 text-white text-[10px] px-3 py-1.5 rounded-lg font-black hover:bg-black uppercase";
                    downloadBtn.innerText = "Download";

                    // 2. Official API Upload
                    status.innerText = "UPLOADING TO WEEE!...";
                    status.className = "text-sm font-bold px-4 py-2 rounded-lg bg-blue-600 text-white animate-pulse";
                    
                    const myHeaders = new Headers();
                    myHeaders.append("Authorization", API_TOKEN);

                    const formdata = new FormData();
                    formdata.append("flags", "4");
                    formdata.append("file", finalFile, finalFile.name);

                    const requestOptions = {
                        method: 'POST',
                        headers: myHeaders,
                        body: formdata,
                        redirect: 'follow'
                    };

                    const response = await fetch(API_ENDPOINT, requestOptions);
                    const result = await response.json();

                    if (result.success) {
                        finishRow(row, result.result.url); // Use the official URL
                    } else {
                        row.querySelector('.url-input').value = "UPLOAD FAILED";
                    }
                } catch (err) {
                    console.error("Upload Error:", err);
                    row.querySelector('.url-input').value = "API ERROR - Check Network";
                }
            }
            status.innerText = "ALL COMPLETED";
            status.className = "text-sm font-bold px-4 py-2 rounded-lg bg-green-500 text-white";
        }

        async function compressImage(file, targetMB) {
            const targetBytes = targetMB * 1024 * 1024;
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const ctx = canvas.getContext('2d');
                        let quality = 0.9;
                        const step = () => {
                            canvas.width = w; canvas.height = h;
                            ctx.drawImage(img, 0, 0, w, h);
                            canvas.toBlob((blob) => {
                                if (blob.size <= targetBytes || quality <= 0.1) resolve(blob);
                                else {
                                    quality -= 0.1;
                                    if (quality < 0.5) { w *= 0.9; h *= 0.9; }
                                    step();
                                }
                            }, 'image/jpeg', quality);
                        };
                        step();
                    };
                };
            });
        }

        function createRow(file) {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50 transition-colors group";
            tr.innerHTML = `
                <td class="px-6 py-6">
                    <div class="w-24 h-24 flex items-center justify-center bg-slate-100 rounded-xl border-2 border-white shadow-sm overflow-hidden">
                        <img src="${URL.createObjectURL(file)}" class="max-w-full max-h-full object-contain">
                    </div>
                </td>
                <td class="px-6 py-6">
                    <p class="text-sm font-black text-slate-800 truncate max-w-[150px] mb-1">${file.name}</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">Size: ${(file.size / 1024 / 1024).toFixed(2)} MB</p>
                    <p class="process-info text-[10px] text-blue-500 font-black mt-2 tracking-tighter italic uppercase">Processing...</p>
                </td>
                <td class="px-6 py-6">
                    <input type="text" readonly value="CONNECTING..." 
                        class="url-input w-full text-[11px] py-2.5 px-4 border border-slate-200 rounded-xl bg-slate-50 text-slate-400 font-mono outline-none">
                </td>
                <td class="px-6 py-6 text-right space-y-2">
                    <button onclick="copyLink(this)" disabled class="copy-btn block ml-auto bg-slate-100 text-slate-400 text-[10px] px-3 py-1.5 rounded-lg font-black uppercase transition-all cursor-not-allowed">Copy Link</button>
                    <button disabled class="download-btn block ml-auto bg-slate-100 text-slate-400 text-[10px] px-3 py-1.5 rounded-lg font-black uppercase">Wait...</button>
                </td>
            `;
            return tr;
        }

        function finishRow(row, url) {
            const input = row.querySelector('.url-input');
            const btn = row.querySelector('.copy-btn');
            input.value = url;
            input.className = "url-input w-full text-[11px] py-2.5 px-4 border border-green-200 rounded-xl bg-white text-green-700 font-bold shadow-sm";
            btn.disabled = false;
            btn.className = "copy-btn block ml-auto bg-green-600 text-white text-[10px] px-3 py-1.5 rounded-lg font-black uppercase hover:bg-green-700 shadow-lg cursor-pointer";
            row.setAttribute('data-url', url);
        }

        function downloadFile(file) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(file);
            a.download = file.name;
            a.click();
        }

        function copyLink(btn) {
            const url = btn.closest('tr').getAttribute('data-url');
            navigator.clipboard.writeText(url).then(() => {
                const old = btn.innerText;
                btn.innerText = "COPIED!";
                btn.classList.replace('bg-green-600', 'bg-blue-600');
                setTimeout(() => {
                    btn.innerText = old;
                    btn.classList.replace('bg-blue-600', 'bg-green-600');
                }, 1500);
            });
        }
    </script>
</body>
</html>
